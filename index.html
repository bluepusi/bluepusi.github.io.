<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bluepusi</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --text: #111;
    --muted: #999;
    --border: #e0ddd6;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* Subtle grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  .page {
    width: 100%;
    max-width: 520px;
  }

  /* Button grid */
  .grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    padding: 18px 22px;
    border-radius: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    letter-spacing: 0.02em;
    transition: transform 0.18s cubic-bezier(.22,.68,0,1.2), box-shadow 0.18s, filter 0.18s;
    position: relative;
    overflow: hidden;
  }

  .btn-link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.18s;
  }

  .btn-link:hover {
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
  }

  .btn-link:hover::before {
    background: rgba(255,255,255,0.1);
  }

  .btn-link:active {
    transform: translateY(0) scale(0.99);
  }

  .btn-label {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-arrow {
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.18s, transform 0.18s;
    font-size: 0.9rem;
  }

  .btn-link:hover .btn-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 60px 0;
    letter-spacing: 0.05em;
    line-height: 2;
  }

  /* Fade in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .btn-link {
    animation: fadeUp 0.4s ease both;
  }
</style>
</head>
<body>
<div class="page">
  <div class="grid" id="grid">
    <div class="empty">no links yet</div>
  </div>
</div>

<script>
  function loadButtons() {
    const grid = document.getElementById('grid');
    const raw = localStorage.getItem('bhub_buttons');
    if (!raw) return;

    let buttons;
    try { buttons = JSON.parse(raw); } catch { return; }
    if (!buttons || !buttons.length) return;

    grid.innerHTML = '';
    buttons.forEach((b, i) => {
      const a = document.createElement('a');
      a.href = b.url || '#';
      a.target = b.target || '_blank';
      a.rel = 'noopener noreferrer';
      a.className = 'btn-link';
      a.style.cssText = `
        background: linear-gradient(${b.gangle || 135}deg, ${b.gc1 || '#111'}, ${b.gc2 || '#333'});
        color: ${b.txtColor || '#fff'};
        font-size: ${b.fontSize || 15}px;
        border-radius: ${b.bradius || 12}px;
        border: ${b.bwidth || 0}px solid ${b.bcolor || 'transparent'};
        animation-delay: ${i * 0.06}s;
      `;
      a.innerHTML = `
        <span class="btn-label">
          ${b.icon ? `<span>${b.icon}</span>` : ''}
          <span>${b.label || 'Link'}</span>
        </span>
        <span class="btn-arrow">→</span>
      `;
      grid.appendChild(a);
    });
  }

  loadButtons();
  // Also reload if storage changes (e.g. editor open in another tab)
  window.addEventListener('storage', loadButtons);
</script>
</body>
</html>
