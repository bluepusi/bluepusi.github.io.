<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Hub — Customize & Launch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --accent: #7c3aed;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 20% 10%, #1a0a3a 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, #0a1a3a 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 60px;
  }

  header h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }

  header p {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }

  /* Layout */
  .workspace {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 28px;
    align-items: start;
  }

  @media (max-width: 768px) {
    .workspace { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    position: sticky;
    top: 24px;
  }

  .panel h2 {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
  }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  .field input[type="text"],
  .field input[type="url"],
  .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }

  .color-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .color-field label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .color-field input[type="color"] {
    width: 100%;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    cursor: pointer;
    padding: 3px;
  }

  .field input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .range-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    float: right;
  }

  /* Tabs */
  .tab-row {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Add button */
  .add-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 8px;
  }

  .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }

  /* Preview area */
  .preview-area h2 {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
  }

  .buttons-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    min-height: 200px;
    align-items: flex-start;
  }

  .empty-state {
    width: 100%;
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 40px 0;
    letter-spacing: 0.05em;
  }

  /* The dynamic buttons */
  .dyn-btn-wrap {
    position: relative;
  }

  .dyn-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    white-space: nowrap;
    border: none;
    overflow: hidden;
  }

  .dyn-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .dyn-btn:hover::after {
    background: rgba(255,255,255,0.12);
  }

  .remove-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 20px;
    height: 20px;
    background: #ef4444;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }

  .dyn-btn-wrap:hover .remove-btn { opacity: 1; }

  /* Tooltip */
  .dyn-btn-wrap .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e1e2e;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .dyn-btn-wrap:hover .tooltip { opacity: 1; }

  /* Export section */
  .export-bar {
    margin-top: 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .sec-btn {
    padding: 10px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .sec-btn:hover { border-color: var(--accent); background: #1a0a3a; }

  /* Code output */
  .code-out {
    margin-top: 16px;
    background: #070710;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: #a78bfa;
    white-space: pre-wrap;
    max-height: 280px;
    overflow-y: auto;
    display: none;
    line-height: 1.6;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── AUTH OVERLAY ── */
  #authOverlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #07070f;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
  }

  #authOverlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 40%, #1a0a3a 0%, transparent 70%);
    pointer-events: none;
  }

  .auth-box {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px 40px;
    width: 380px;
    max-width: 90vw;
    text-align: center;
  }

  .auth-lock {
    font-size: 2.8rem;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 20px #7c3aed88);
  }

  .auth-box h2 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .auth-box p {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    margin-bottom: 28px;
    letter-spacing: 0.05em;
  }

  .auth-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    outline: none;
    text-align: center;
    letter-spacing: 0.2em;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 16px;
  }

  .auth-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #7c3aed22;
  }

  .auth-input.error {
    border-color: #ef4444;
    animation: authShake 0.4s ease;
  }

  @keyframes authShake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }

  .auth-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .auth-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .auth-err {
    margin-top: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #ef4444;
    min-height: 18px;
    letter-spacing: 0.05em;
  }

  .auth-attempts {
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* Locked panel state */
  .panel-locked {
    pointer-events: none;
    opacity: 0.4;
    filter: blur(3px);
    user-select: none;
  }

  /* Lock toggle badge */
  #lockBadge {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #lockBadge:hover { border-color: var(--accent); color: var(--text); }
  #lockBadge.unlocked { border-color: #22c55e44; color: #22c55e; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Button Hub</h1>
    <p>// design · customize · launch</p>
  </header>

  <div class="workspace">
    <!-- Control Panel -->
    <div class="panel">
      <h2>// Configure</h2>

      <div class="tab-row">
        <button class="tab active" onclick="switchTab('style')">Style</button>
        <button class="tab" onclick="switchTab('layout')">Layout</button>
        <button class="tab" onclick="switchTab('hover')">Hover</button>
      </div>

      <!-- STYLE TAB -->
      <div class="tab-content active" id="tab-style">
        <div class="field">
          <label>Label</label>
          <input type="text" id="btnLabel" value="Click Me" placeholder="Button text">
        </div>
        <div class="field">
          <label>URL / Link</label>
          <input type="url" id="btnUrl" value="https://example.com" placeholder="https://...">
        </div>
        <div class="field">
          <label>Open in</label>
          <select id="btnTarget">
            <option value="_blank">New Tab</option>
            <option value="_self">Same Tab</option>
          </select>
        </div>
        <div class="field">
          <label>Icon (emoji)</label>
          <input type="text" id="btnIcon" value="🚀" placeholder="Paste emoji or leave empty">
        </div>
        <div class="field">
          <label>Gradient — Start <span class="range-val" id="lbl-gc1"></span></label>
          <div class="color-row">
            <div class="color-field">
              <label>Color 1</label>
              <input type="color" id="gc1" value="#7c3aed">
            </div>
            <div class="color-field">
              <label>Color 2</label>
              <input type="color" id="gc2" value="#3b82f6">
            </div>
          </div>
        </div>
        <div class="field">
          <label>Gradient Angle <span class="range-val" id="lbl-gangle">135°</span></label>
          <input type="range" id="gangle" min="0" max="360" value="135" oninput="document.getElementById('lbl-gangle').textContent=this.value+'°'">
        </div>
        <div class="field">
          <label>Text Color</label>
          <input type="color" id="txtColor" value="#ffffff">
        </div>
      </div>

      <!-- LAYOUT TAB -->
      <div class="tab-content" id="tab-layout">
        <div class="field">
          <label>Font Size <span class="range-val" id="lbl-fs">16px</span></label>
          <input type="range" id="fontSize" min="11" max="28" value="16" oninput="document.getElementById('lbl-fs').textContent=this.value+'px'">
        </div>
        <div class="field">
          <label>Padding H <span class="range-val" id="lbl-ph">28px</span></label>
          <input type="range" id="padH" min="8" max="72" value="28" oninput="document.getElementById('lbl-ph').textContent=this.value+'px'">
        </div>
        <div class="field">
          <label>Padding V <span class="range-val" id="lbl-pv">14px</span></label>
          <input type="range" id="padV" min="6" max="40" value="14" oninput="document.getElementById('lbl-pv').textContent=this.value+'px'">
        </div>
        <div class="field">
          <label>Border Radius <span class="range-val" id="lbl-br">12px</span></label>
          <input type="range" id="bradius" min="0" max="50" value="12" oninput="document.getElementById('lbl-br').textContent=this.value+'px'">
        </div>
        <div class="field">
          <label>Border Width <span class="range-val" id="lbl-bw">0px</span></label>
          <input type="range" id="bwidth" min="0" max="4" value="0" oninput="document.getElementById('lbl-bw').textContent=this.value+'px'">
        </div>
        <div class="field">
          <label>Border Color</label>
          <input type="color" id="bcolor" value="#ffffff">
        </div>
        <div class="field">
          <label>Shadow Intensity <span class="range-val" id="lbl-shad">20px</span></label>
          <input type="range" id="shadowSize" min="0" max="60" value="20" oninput="document.getElementById('lbl-shad').textContent=this.value+'px'">
        </div>
      </div>

      <!-- HOVER TAB -->
      <div class="tab-content" id="tab-hover">
        <div class="field">
          <label>Hover Effect</label>
          <select id="hoverEffect">
            <option value="lift">Lift + Glow</option>
            <option value="scale">Scale Up</option>
            <option value="shake">Shake</option>
            <option value="pulse">Pulse</option>
            <option value="tilt">Tilt</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="field">
          <label>Hover Glow Color</label>
          <input type="color" id="glowColor" value="#7c3aed">
        </div>
        <div class="field">
          <label>Glow Spread <span class="range-val" id="lbl-gs">20px</span></label>
          <input type="range" id="glowSpread" min="0" max="60" value="20" oninput="document.getElementById('lbl-gs').textContent=this.value+'px'">
        </div>
        <div class="field">
          <label>Transition Speed <span class="range-val" id="lbl-ts">0.25s</span></label>
          <input type="range" id="transSpeed" min="5" max="80" value="25" oninput="document.getElementById('lbl-ts').textContent=(this.value/100).toFixed(2)+'s'">
        </div>
        <div class="field">
          <label>Tooltip Text</label>
          <input type="text" id="tooltipText" placeholder="e.g. Visit page →">
        </div>
      </div>

      <button class="add-btn" onclick="addButton()">＋ Add Button</button>
    </div>

    <!-- Preview & Output -->
    <div class="preview-area">
      <h2>// Live Preview</h2>
      <div class="buttons-grid" id="buttonsGrid">
        <div class="empty-state" id="emptyState">No buttons yet — configure & add one →</div>
      </div>

      <div class="export-bar">
        <button class="sec-btn" onclick="exportHTML()">Export HTML</button>
        <button class="sec-btn" onclick="clearAll()">Clear All</button>
      </div>

      <pre class="code-out" id="codeOut"></pre>
    </div>
  </div>
</div>

<!-- AUTH OVERLAY -->
<div id="authOverlay">
  <div class="auth-box">
    <span class="auth-lock">🔐</span>
    <h2>Editor Access</h2>
    <p id="authSubtitle">// owner only — enter password</p>
    <input class="auth-input" type="password" id="authInput" placeholder="••••••••" maxlength="64" onkeydown="if(event.key==='Enter')tryAuth()">
    <button class="auth-btn" onclick="tryAuth()">Unlock Editor</button>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-attempts" id="authAttempts"></div>
  </div>
</div>

<!-- Lock badge (shown when unlocked) -->
<button id="lockBadge" onclick="lockEditor()" style="display:none">
  <span>🔓</span> <span>Editor Unlocked — Lock</span>
</button>

<style id="hoverStyles">
  @keyframes btnShake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-4px)}
    40%{transform:translateX(4px)}
    60%{transform:translateX(-3px)}
    80%{transform:translateX(3px)}
  }
  @keyframes btnPulse {
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.06)}
  }
</style>

<script>
  // ── AUTH ──────────────────────────────────────────────────────────────────
  // Password is stored as a SHA-256 hash. Default password: ButtonHub2024!
  // To change it: open browser console and run:  setNewPassword('YourNewPassword')
  // then copy the hash it prints and replace STORED_HASH below.

  const DEFAULT_HASH = 'a3b2c1'; // placeholder — replaced on first run
  let STORED_HASH = localStorage.getItem('bhub_pw') || null;
  let failCount = 0;
  const MAX_FAILS = 10;
  let lockoutUntil = parseInt(localStorage.getItem('bhub_lockout') || '0');

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // Call this once in console to set your password
  window.setNewPassword = async function(pw) {
    const h = await sha256(pw);
    localStorage.setItem('bhub_pw', h);
    STORED_HASH = h;
    console.log('%c✅ Password set! Hash saved to localStorage.', 'color:#22c55e;font-weight:bold');
    console.log('Hash:', h);
  };

  async function tryAuth() {
    const now = Date.now();
    if (now < lockoutUntil) {
      const secs = Math.ceil((lockoutUntil - now) / 1000);
      document.getElementById('authErr').textContent = `Too many attempts. Wait ${secs}s.`;
      return;
    }

    const input = document.getElementById('authInput').value;
    if (!input) return;

    // First time — no password set yet — set it now
    if (!STORED_HASH) {
      await window.setNewPassword(input);
      unlockEditor();
      return;
    }

    const h = await sha256(input);
    if (h === STORED_HASH) {
      failCount = 0;
      unlockEditor();
    } else {
      failCount++;
      const inp = document.getElementById('authInput');
      inp.classList.add('error');
      setTimeout(() => inp.classList.remove('error'), 500);
      inp.value = '';

      const remaining = MAX_FAILS - failCount;
      if (failCount >= MAX_FAILS) {
        const until = Date.now() + 60000;
        localStorage.setItem('bhub_lockout', until);
        lockoutUntil = until;
        document.getElementById('authErr').textContent = 'Locked out for 60 seconds.';
        document.getElementById('authAttempts').textContent = '';
        startLockoutTimer();
      } else {
        document.getElementById('authErr').textContent = 'Wrong password.';
        document.getElementById('authAttempts').textContent = `${remaining} attempt${remaining!==1?'s':''} remaining`;
      }
    }
  }

  function startLockoutTimer() {
    const interval = setInterval(() => {
      const secs = Math.ceil((lockoutUntil - Date.now()) / 1000);
      if (secs <= 0) {
        clearInterval(interval);
        document.getElementById('authErr').textContent = '';
        document.getElementById('authAttempts').textContent = 'You may try again.';
        failCount = 0;
      } else {
        document.getElementById('authErr').textContent = `Locked. ${secs}s remaining.`;
      }
    }, 1000);
  }

  function unlockEditor() {
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('lockBadge').style.display = 'flex';
    document.getElementById('lockBadge').classList.add('unlocked');
    if (!STORED_HASH) {
      document.getElementById('authSubtitle').textContent = '// first run — password saved ✓';
    }
  }

  function lockEditor() {
    document.getElementById('authOverlay').style.display = 'flex';
    document.getElementById('lockBadge').style.display = 'none';
    document.getElementById('authInput').value = '';
    document.getElementById('authErr').textContent = '';
    document.getElementById('authAttempts').textContent = '';
  }

  // Check lockout on load
  window.addEventListener('load', () => {
    if (!STORED_HASH) {
      document.getElementById('authSubtitle').textContent = '// first run — set your password below';
      document.getElementById('authErr').textContent = '';
      document.querySelector('.auth-box p').textContent = '// no password set — type one to create it';
    }
    if (Date.now() < lockoutUntil) startLockoutTimer();
  });

  // ── APP ───────────────────────────────────────────────────────────────────
  const buttons = [];
  let idCount = 0;

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`#tab-${name}`).classList.add('active');
    event.target.classList.add('active');
  }

  function getVals() {
    return {
      id: ++idCount,
      label: document.getElementById('btnLabel').value || 'Button',
      url: document.getElementById('btnUrl').value || '#',
      target: document.getElementById('btnTarget').value,
      icon: document.getElementById('btnIcon').value,
      gc1: document.getElementById('gc1').value,
      gc2: document.getElementById('gc2').value,
      gangle: document.getElementById('gangle').value,
      txtColor: document.getElementById('txtColor').value,
      fontSize: document.getElementById('fontSize').value,
      padH: document.getElementById('padH').value,
      padV: document.getElementById('padV').value,
      bradius: document.getElementById('bradius').value,
      bwidth: document.getElementById('bwidth').value,
      bcolor: document.getElementById('bcolor').value,
      shadowSize: document.getElementById('shadowSize').value,
      hoverEffect: document.getElementById('hoverEffect').value,
      glowColor: document.getElementById('glowColor').value,
      glowSpread: document.getElementById('glowSpread').value,
      transSpeed: (document.getElementById('transSpeed').value / 100).toFixed(2),
      tooltip: document.getElementById('tooltipText').value,
    };
  }

  function buildStyle(b, isHovered = false) {
    const base = `
      background: linear-gradient(${b.gangle}deg, ${b.gc1}, ${b.gc2});
      color: ${b.txtColor};
      font-size: ${b.fontSize}px;
      padding: ${b.padV}px ${b.padH}px;
      border-radius: ${b.bradius}px;
      border: ${b.bwidth}px solid ${b.bcolor};
      transition: transform ${b.transSpeed}s, box-shadow ${b.transSpeed}s, filter ${b.transSpeed}s;
    `;
    return base;
  }

  function buildHoverCSS(b) {
    const id = `btn-${b.id}`;
    const glow = `0 0 ${b.glowSpread}px ${b.glowColor}88`;
    let hoverTransform = '';
    let hoverAnim = '';

    switch (b.hoverEffect) {
      case 'lift':    hoverTransform = 'translateY(-4px) scale(1.02)'; break;
      case 'scale':   hoverTransform = 'scale(1.08)'; break;
      case 'shake':   hoverAnim = `btnShake 0.4s ease`; break;
      case 'pulse':   hoverAnim = `btnPulse 0.6s ease infinite`; break;
      case 'tilt':    hoverTransform = 'rotate(-3deg) scale(1.04)'; break;
      default: break;
    }

    return `
      #${id}:hover {
        ${hoverTransform ? `transform: ${hoverTransform};` : ''}
        ${hoverAnim ? `animation: ${hoverAnim};` : ''}
        box-shadow: ${glow};
        filter: brightness(1.1);
      }
    `;
  }

  function addButton() {
    const b = getVals();
    buttons.push(b);
    renderButton(b);
    injectHoverCSS(b);
    document.getElementById('emptyState')?.remove();
    document.getElementById('codeOut').style.display = 'none';
  }

  function renderButton(b) {
    const grid = document.getElementById('buttonsGrid');

    const wrap = document.createElement('div');
    wrap.className = 'dyn-btn-wrap';
    wrap.id = `wrap-${b.id}`;

    const a = document.createElement('a');
    a.href = b.url;
    a.target = b.target;
    a.className = 'dyn-btn';
    a.id = `btn-${b.id}`;
    a.style.cssText = buildStyle(b);
    a.innerHTML = `${b.icon ? `<span>${b.icon}</span>` : ''}${b.label}`;

    const rm = document.createElement('button');
    rm.className = 'remove-btn';
    rm.innerHTML = '✕';
    rm.onclick = () => removeButton(b.id);

    const tt = document.createElement('div');
    tt.className = 'tooltip';
    tt.textContent = b.tooltip || b.url;

    wrap.appendChild(tt);
    wrap.appendChild(a);
    wrap.appendChild(rm);
    grid.appendChild(wrap);
  }

  function injectHoverCSS(b) {
    const style = document.createElement('style');
    style.id = `style-${b.id}`;
    style.textContent = buildHoverCSS(b);
    document.head.appendChild(style);
  }

  function removeButton(id) {
    const idx = buttons.findIndex(b => b.id === id);
    if (idx > -1) buttons.splice(idx, 1);
    document.getElementById(`wrap-${id}`)?.remove();
    document.getElementById(`style-${id}`)?.remove();
    const grid = document.getElementById('buttonsGrid');
    if (grid.children.length === 0) {
      const emp = document.createElement('div');
      emp.className = 'empty-state';
      emp.id = 'emptyState';
      emp.textContent = 'No buttons yet — configure & add one →';
      grid.appendChild(emp);
    }
    document.getElementById('codeOut').style.display = 'none';
  }

  function clearAll() {
    buttons.length = 0;
    idCount = 0;
    const grid = document.getElementById('buttonsGrid');
    grid.innerHTML = '<div class="empty-state" id="emptyState">No buttons yet — configure & add one →</div>';
    document.querySelectorAll('[id^="style-"]').forEach(s => s.remove());
    document.getElementById('codeOut').style.display = 'none';
  }

  function exportHTML() {
    if (buttons.length === 0) return;
    let out = `<!-- Button Hub Export -->\n<style>\n`;
    buttons.forEach(b => { out += buildHoverCSS(b); });
    out += `\n</style>\n\n`;
    buttons.forEach(b => {
      const icon = b.icon ? `<span>${b.icon}</span> ` : '';
      out += `<a href="${b.url}" target="${b.target}" id="btn-${b.id}" style="${buildStyle(b).replace(/\s+/g,' ').trim()}" class="dyn-btn">${icon}${b.label}</a>\n`;
    });
    const el = document.getElementById('codeOut');
    el.textContent = out;
    el.style.display = 'block';
  }
</script>
</body>
</html>
