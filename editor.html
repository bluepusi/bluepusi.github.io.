<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor — bluepusi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --accent: #7c3aed;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 20% 10%, #1a0a3a 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, #0a1a3a 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  header p {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  .workspace {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 28px;
    align-items: start;
  }

  @media (max-width: 768px) { .workspace { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    position: sticky;
    top: 24px;
  }

  .panel-title {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 5px;
    font-family: 'DM Mono', monospace;
  }

  .field input[type="text"],
  .field input[type="url"],
  .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus { border-color: var(--accent); }

  .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .color-field label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 5px;
    font-family: 'DM Mono', monospace;
  }

  .color-field input[type="color"] {
    width: 100%;
    height: 38px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    cursor: pointer;
    padding: 3px;
  }

  .field input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .rv {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    float: right;
  }

  .tab-row {
    display: flex;
    gap: 4px;
    margin-bottom: 18px;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 7px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active { background: var(--accent); color: #fff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .add-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), #4f46e5);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 6px;
  }

  .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  /* Preview */
  .preview-area h2 {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
  }

  .buttons-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    min-height: 180px;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 40px 0;
  }

  .dyn-btn-wrap { position: relative; }

  .dyn-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    white-space: nowrap;
    border: none;
    overflow: hidden;
    width: 100%;
  }

  .dyn-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

  .remove-btn {
    position: absolute;
    top: 50%;
    right: -10px;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    background: #ef4444;
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }

  .dyn-btn-wrap:hover .remove-btn { opacity: 1; }

  .export-bar {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .sec-btn {
    padding: 9px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
  }

  .sec-btn:hover { border-color: var(--accent); background: #1a0a3a; }
  .sec-btn.green { border-color: #22c55e44; color: #22c55e; }
  .sec-btn.green:hover { background: #052010; border-color: #22c55e; }

  .save-status {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #22c55e;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .save-status.show { opacity: 1; }

  /* ── AUTH ── */
  #authOverlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #07070f;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #authOverlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 40%, #1a0a3a 0%, transparent 70%);
    pointer-events: none;
  }

  .auth-box {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px 40px;
    width: 380px;
    max-width: 90vw;
    text-align: center;
  }

  .auth-lock { font-size: 2.8rem; margin-bottom: 16px; display: block; filter: drop-shadow(0 0 20px #7c3aed88); }

  .auth-box h2 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .auth-box p {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    margin-bottom: 28px;
  }

  .auth-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    outline: none;
    text-align: center;
    letter-spacing: 0.2em;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 14px;
  }

  .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #7c3aed22; }
  .auth-input.error { border-color: #ef4444; animation: authShake 0.4s ease; }

  @keyframes authShake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }

  .auth-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .auth-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .auth-err { margin-top: 14px; font-family: 'DM Mono', monospace; font-size: 0.75rem; color: #ef4444; min-height: 18px; }
  .auth-attempts { margin-top: 6px; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @keyframes btnShake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)}
    40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
  }
  @keyframes btnPulse {
    0%,100%{transform:scale(1)} 50%{transform:scale(1.06)}
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="authOverlay">
  <div class="auth-box">
    <span class="auth-lock">🔐</span>
    <h2>Editor Access</h2>
    <p id="authSub">// owner only</p>
    <input class="auth-input" type="password" id="authInput" placeholder="••••••••" maxlength="64" onkeydown="if(event.key==='Enter')tryAuth()">
    <button class="auth-btn" onclick="tryAuth()">Unlock</button>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-attempts" id="authAttempts"></div>
  </div>
</div>

<div class="container">
  <header>
    <h1>Button Editor</h1>
    <p>// changes save to bluepusi.github.io automatically</p>
  </header>

  <div class="workspace">
    <div class="panel">
      <div class="panel-title">// configure button</div>

      <div class="tab-row">
        <button class="tab active" onclick="switchTab('style',this)">Style</button>
        <button class="tab" onclick="switchTab('layout',this)">Layout</button>
        <button class="tab" onclick="switchTab('hover',this)">Hover</button>
      </div>

      <!-- STYLE -->
      <div class="tab-content active" id="tab-style">
        <div class="field"><label>Label</label><input type="text" id="btnLabel" value="My Link"></div>
        <div class="field"><label>URL</label><input type="url" id="btnUrl" value="https://"></div>
        <div class="field"><label>Open in</label>
          <select id="btnTarget"><option value="_blank">New Tab</option><option value="_self">Same Tab</option></select>
        </div>
        <div class="field"><label>Icon (emoji)</label><input type="text" id="btnIcon" value="🔗"></div>
        <div class="field">
          <label>Gradient Colors</label>
          <div class="color-row">
            <div class="color-field"><label>Color 1</label><input type="color" id="gc1" value="#111111"></div>
            <div class="color-field"><label>Color 2</label><input type="color" id="gc2" value="#333333"></div>
          </div>
        </div>
        <div class="field">
          <label>Gradient Angle <span class="rv" id="lbl-ga">135°</span></label>
          <input type="range" id="gangle" min="0" max="360" value="135" oninput="document.getElementById('lbl-ga').textContent=this.value+'°'">
        </div>
        <div class="field"><label>Text Color</label><input type="color" id="txtColor" value="#ffffff"></div>
      </div>

      <!-- LAYOUT -->
      <div class="tab-content" id="tab-layout">
        <div class="field"><label>Font Size <span class="rv" id="lbl-fs">15px</span></label>
          <input type="range" id="fontSize" min="11" max="26" value="15" oninput="document.getElementById('lbl-fs').textContent=this.value+'px'"></div>
        <div class="field"><label>Padding H <span class="rv" id="lbl-ph">24px</span></label>
          <input type="range" id="padH" min="8" max="60" value="24" oninput="document.getElementById('lbl-ph').textContent=this.value+'px'"></div>
        <div class="field"><label>Padding V <span class="rv" id="lbl-pv">16px</span></label>
          <input type="range" id="padV" min="6" max="36" value="16" oninput="document.getElementById('lbl-pv').textContent=this.value+'px'"></div>
        <div class="field"><label>Border Radius <span class="rv" id="lbl-br">12px</span></label>
          <input type="range" id="bradius" min="0" max="50" value="12" oninput="document.getElementById('lbl-br').textContent=this.value+'px'"></div>
        <div class="field"><label>Border Width <span class="rv" id="lbl-bw">0px</span></label>
          <input type="range" id="bwidth" min="0" max="4" value="0" oninput="document.getElementById('lbl-bw').textContent=this.value+'px'"></div>
        <div class="field"><label>Border Color</label><input type="color" id="bcolor" value="#ffffff"></div>
      </div>

      <!-- HOVER -->
      <div class="tab-content" id="tab-hover">
        <div class="field"><label>Hover Effect</label>
          <select id="hoverEffect">
            <option value="lift">Lift + Glow</option>
            <option value="scale">Scale Up</option>
            <option value="shake">Shake</option>
            <option value="pulse">Pulse</option>
            <option value="tilt">Tilt</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="field"><label>Glow Color</label><input type="color" id="glowColor" value="#7c3aed"></div>
        <div class="field"><label>Glow Spread <span class="rv" id="lbl-gs">20px</span></label>
          <input type="range" id="glowSpread" min="0" max="60" value="20" oninput="document.getElementById('lbl-gs').textContent=this.value+'px'"></div>
      </div>

      <button class="add-btn" onclick="addButton()">＋ Add Button</button>
    </div>

    <!-- PREVIEW -->
    <div class="preview-area">
      <h2>// preview (drag to reorder)</h2>
      <div class="buttons-grid" id="buttonsGrid">
        <div class="empty-state" id="emptyState">No buttons yet →</div>
      </div>
      <div class="export-bar">
        <button class="sec-btn green" onclick="saveToStorage()">💾 Save to Site</button>
        <button class="sec-btn" onclick="clearAll()">Clear All</button>
        <a class="sec-btn" href="index.html" target="_blank">👁 View Public Page</a>
        <span class="save-status" id="saveStatus">✓ Saved!</span>
      </div>
    </div>
  </div>
</div>

<script>
  // ── AUTH ──────────────────────────────────────────────────────────────────
  let STORED_HASH = localStorage.getItem('bhub_pw') || null;
  let failCount = 0;
  const MAX_FAILS = 10;
  let lockoutUntil = parseInt(localStorage.getItem('bhub_lockout') || '0');

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  window.setNewPassword = async function(pw) {
    const h = await sha256(pw);
    localStorage.setItem('bhub_pw', h);
    STORED_HASH = h;
    console.log('%c✅ Password set!', 'color:#22c55e;font-weight:bold');
  };

  async function tryAuth() {
    const now = Date.now();
    if (now < lockoutUntil) {
      const secs = Math.ceil((lockoutUntil - now) / 1000);
      document.getElementById('authErr').textContent = `Locked. Wait ${secs}s.`;
      return;
    }
    const input = document.getElementById('authInput').value;
    if (!input) return;

    if (!STORED_HASH) {
      await window.setNewPassword(input);
      unlockEditor();
      return;
    }

    const h = await sha256(input);
    if (h === STORED_HASH) {
      failCount = 0;
      unlockEditor();
    } else {
      failCount++;
      const inp = document.getElementById('authInput');
      inp.classList.add('error');
      setTimeout(() => inp.classList.remove('error'), 500);
      inp.value = '';
      const rem = MAX_FAILS - failCount;
      if (failCount >= MAX_FAILS) {
        lockoutUntil = Date.now() + 60000;
        localStorage.setItem('bhub_lockout', lockoutUntil);
        document.getElementById('authErr').textContent = 'Locked 60s.';
        startLockoutTimer();
      } else {
        document.getElementById('authErr').textContent = `Wrong password. ${rem} left.`;
      }
    }
  }

  function startLockoutTimer() {
    const iv = setInterval(() => {
      const s = Math.ceil((lockoutUntil - Date.now()) / 1000);
      if (s <= 0) { clearInterval(iv); document.getElementById('authErr').textContent = ''; document.getElementById('authAttempts').textContent = 'Try again.'; failCount = 0; }
      else document.getElementById('authErr').textContent = `Locked. ${s}s remaining.`;
    }, 1000);
  }

  function unlockEditor() {
    document.getElementById('authOverlay').style.display = 'none';
    loadFromStorage();
  }

  window.addEventListener('load', () => {
    if (!STORED_HASH) {
      document.getElementById('authSub').textContent = '// first run — type a password to set it';
    }
    if (Date.now() < lockoutUntil) startLockoutTimer();
  });

  // ── APP ───────────────────────────────────────────────────────────────────
  let buttons = [];
  let idCount = 0;

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    el.classList.add('active');
  }

  function getVals() {
    return {
      id: ++idCount,
      label: document.getElementById('btnLabel').value || 'Link',
      url: document.getElementById('btnUrl').value || '#',
      target: document.getElementById('btnTarget').value,
      icon: document.getElementById('btnIcon').value,
      gc1: document.getElementById('gc1').value,
      gc2: document.getElementById('gc2').value,
      gangle: document.getElementById('gangle').value,
      txtColor: document.getElementById('txtColor').value,
      fontSize: document.getElementById('fontSize').value,
      padH: document.getElementById('padH').value,
      padV: document.getElementById('padV').value,
      bradius: document.getElementById('bradius').value,
      bwidth: document.getElementById('bwidth').value,
      bcolor: document.getElementById('bcolor').value,
      hoverEffect: document.getElementById('hoverEffect').value,
      glowColor: document.getElementById('glowColor').value,
      glowSpread: document.getElementById('glowSpread').value,
    };
  }

  function addButton() {
    const b = getVals();
    buttons.push(b);
    renderButton(b);
    document.getElementById('emptyState')?.remove();
    injectHoverCSS(b);
  }

  function renderButton(b) {
    const grid = document.getElementById('buttonsGrid');
    const wrap = document.createElement('div');
    wrap.className = 'dyn-btn-wrap';
    wrap.id = 'wrap-' + b.id;

    const a = document.createElement('a');
    a.href = b.url;
    a.target = b.target;
    a.className = 'dyn-btn';
    a.id = 'btn-' + b.id;
    a.style.cssText = `
      background: linear-gradient(${b.gangle}deg, ${b.gc1}, ${b.gc2});
      color: ${b.txtColor};
      font-size: ${b.fontSize}px;
      padding: ${b.padV}px ${b.padH}px;
      border-radius: ${b.bradius}px;
      border: ${b.bwidth}px solid ${b.bcolor};
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    `;
    a.innerHTML = `<span>${b.icon ? b.icon + ' ' : ''}${b.label}</span><span style="opacity:0.6;font-size:0.85em">→</span>`;

    const rm = document.createElement('button');
    rm.className = 'remove-btn';
    rm.innerHTML = '✕';
    rm.onclick = () => removeButton(b.id);

    wrap.appendChild(a);
    wrap.appendChild(rm);
    grid.appendChild(wrap);
  }

  function injectHoverCSS(b) {
    const existing = document.getElementById('style-' + b.id);
    if (existing) existing.remove();
    const glow = `0 0 ${b.glowSpread}px ${b.glowColor}99`;
    let transform = '', anim = '';
    switch (b.hoverEffect) {
      case 'lift':  transform = 'translateY(-3px) scale(1.01)'; break;
      case 'scale': transform = 'scale(1.07)'; break;
      case 'shake': anim = 'btnShake 0.4s ease'; break;
      case 'pulse': anim = 'btnPulse 0.6s ease infinite'; break;
      case 'tilt':  transform = 'rotate(-2deg) scale(1.03)'; break;
    }
    const s = document.createElement('style');
    s.id = 'style-' + b.id;
    s.textContent = `#btn-${b.id}:hover { ${transform ? 'transform:'+transform+';' : ''} ${anim ? 'animation:'+anim+';' : ''} box-shadow: ${glow}; filter: brightness(1.1); }`;
    document.head.appendChild(s);
  }

  function removeButton(id) {
    buttons = buttons.filter(b => b.id !== id);
    document.getElementById('wrap-' + id)?.remove();
    document.getElementById('style-' + id)?.remove();
    const grid = document.getElementById('buttonsGrid');
    if (!grid.querySelector('.dyn-btn-wrap')) {
      grid.innerHTML = '<div class="empty-state" id="emptyState">No buttons yet →</div>';
    }
  }

  function clearAll() {
    buttons = [];
    idCount = 0;
    document.getElementById('buttonsGrid').innerHTML = '<div class="empty-state" id="emptyState">No buttons yet →</div>';
    document.querySelectorAll('[id^="style-"]').forEach(s => s.remove());
  }

  function saveToStorage() {
    localStorage.setItem('bhub_buttons', JSON.stringify(buttons));
    const s = document.getElementById('saveStatus');
    s.classList.add('show');
    setTimeout(() => s.classList.remove('show'), 2000);
  }

  function loadFromStorage() {
    const raw = localStorage.getItem('bhub_buttons');
    if (!raw) return;
    let saved;
    try { saved = JSON.parse(raw); } catch { return; }
    if (!saved?.length) return;
    buttons = [];
    document.getElementById('buttonsGrid').innerHTML = '';
    saved.forEach(b => {
      idCount = Math.max(idCount, b.id || 0);
      buttons.push(b);
      renderButton(b);
      injectHoverCSS(b);
    });
  }
</script>
</body>
</html>
